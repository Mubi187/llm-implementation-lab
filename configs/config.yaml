# configs/config.yaml
data:
  path: data/input.txt
  train_split: 0.9

model:
  block_size: 128
  n_embd: 64
  n_head: 4
  n_layer: 4
  dropout: 0.1

training:
  batch_size: 32
  max_iters: 5000
  eval_interval: 500
  learning_rate: 3.0e-4
  device: cpu                  # change to cuda if available
